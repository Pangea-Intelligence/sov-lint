name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run build
      - run: npm test

  # Dogfooding: Das Repo ist selbst eine GitHub Action. Der erste Step beweist
  # die Action-Verdrahtung (valide Datei -> Step besteht). Die exakten
  # Exit-Codes (1 = Befunde, 2 = Bedienfehler) prüft der Assertion-Step direkt
  # gegen das CLI - so lässt sich "gewollt exit 1" von "kaputt exit 2"
  # unterscheiden, was der reine Step-outcome nicht kann.
  action-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

      - name: Action-Verdrahtung (valide Datei -> Step besteht)
        uses: ./
        with:
          command: lint
          files: examples/arnsberg-antriebstechnik/stueckliste.json
          version: local

      - name: 'Exit-Code-Verträge exakt prüfen'
        run: |
          # GitHub startet das Skript mit "bash -e" - das würde beim ersten
          # gewollten Nicht-Null-Exit (lint findet Befunde) abbrechen. errexit
          # hier bewusst aus, wir prüfen die Codes selbst.
          set +e -u -o pipefail
          fail=0
          check () { # $1=erwartet $2=beschreibung; Kommando folgt via "${@:3}"
            "${@:3}" >/dev/null 2>&1; local code=$?
            if [ "$code" -ne "$1" ]; then
              echo "::error::$2: erwartet Exit $1, war $code"; fail=1
            else
              echo "ok: $2 (Exit $code)"
            fi
          }
          BASE="examples/arnsberg-antriebstechnik"
          check 0 "lint valide"        node dist/cli.js lint "$BASE/stueckliste.json" -q
          check 1 "lint fehlerhaft"    node dist/cli.js lint "$BASE/stueckliste-fehlerhaft.json" -q
          check 2 "lint fehlende Datei" node dist/cli.js lint gibt-es-nicht.json -q
          check 2 "lint ohne Argument"  node dist/cli.js lint
          check 1 "screen Level 1"     node dist/cli.js screen "$BASE/stueckliste.json" -q
          check 2 "screen fehlende Datei" node dist/cli.js screen gibt-es-nicht.json -q
          exit $fail
