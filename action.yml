name: 'sov-lint'
description: 'Linter und Klumpenrisiko-Screening für digitale Abhängigkeits-Stücklisten (CycloneDX 1.6 + dsov-Profil). Von Pangea Intelligence.'
author: 'Pangea Intelligence'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  command:
    description: 'Kommando: lint oder screen'
    required: false
    default: 'lint'
  files:
    description: 'Zu prüfende Datei(en), leerzeichengetrennt. screen erwartet genau eine Datei.'
    required: true
  version:
    description: 'sov-lint-Version von npm (z.B. 0.1.0 oder latest). Sonderwert "local": baut den Checkout dieser Action (nur für die CI dieses Repos).'
    required: false
    default: 'latest'
  args:
    description: 'Zusätzliche CLI-Argumente, z.B. "--json"'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: sov-lint ausführen
      shell: bash
      # Inputs kommen über env: als Variablen herein, NICHT per ${{ }} direkt
      # in den Skripttext. Sonst wäre jeder Input (aus PR-Titel, Branch-Name
      # etc.) eine Script-Injection - böse gemeinte Anführungszeichen brächen
      # aus dem Skript aus und liefen auf dem Runner.
      env:
        SOVLINT_COMMAND: ${{ inputs.command }}
        SOVLINT_FILES: ${{ inputs.files }}
        SOVLINT_VERSION: ${{ inputs.version }}
        SOVLINT_ARGS: ${{ inputs.args }}
        SOVLINT_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        if [ "$SOVLINT_VERSION" = "local" ]; then
          # Aus dem Action-Checkout bauen - so testet die CI dieses Repos die
          # Action selbst, bevor eine Version auf npm liegt.
          ( cd "$SOVLINT_ACTION_PATH" && npm ci --silent && npm run build --silent )
          RUNNER=(node "$SOVLINT_ACTION_PATH/dist/cli.js")
        else
          RUNNER=(npx --yes "sov-lint@$SOVLINT_VERSION")
        fi
        read -r -a FILES <<< "$SOVLINT_FILES"
        read -r -a EXTRA <<< "$SOVLINT_ARGS"
        if [ "${#FILES[@]}" -eq 0 ]; then
          echo "::error::sov-lint: keine Dateien angegeben (Input 'files')"
          exit 2
        fi
        "${RUNNER[@]}" "$SOVLINT_COMMAND" ${FILES[@]+"${FILES[@]}"} ${EXTRA[@]+"${EXTRA[@]}"}
